services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: seo
      POSTGRES_PASSWORD: seo
      POSTGRES_DB: seo_audit
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports: ["8000:8000"]
    command: ["uvicorn", "seo_audit.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes: ["./backend:/app/backend"]

  worker:
    build: .
    env_file: .env
    depends_on: [db, redis]
    command: ["celery", "-A", "seo_audit.tasks.celery_app:celery_app", "worker", "--loglevel=INFO"]
    volumes: ["./backend:/app/backend"]

  beat:
    build: .
    env_file: .env
    depends_on: [db, redis]
    command: ["celery", "-A", "seo_audit.tasks.celery_app:celery_app", "beat", "--loglevel=INFO"]
    volumes: ["./backend:/app/backend"]

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes: ["./frontend:/app"]
    ports: ["3000:3000"]
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"

volumes:
  pgdata:
